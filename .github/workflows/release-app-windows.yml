name: Release desktop app (Windows)

# Build the bundled Windows app (NSIS installer) on a windows-latest runner — no
# local Windows toolchain needed. The runner ships VS Build Tools + WebView2;
# Tauri downloads NSIS during bundling.
#
#   - push a tag `app-v*`  -> build + attach VoiceNote-setup.exe to the SAME
#                            GitHub Release the macOS workflow publishes (so one
#                            release per version carries both installers and the
#                            /latest/ download links work for both platforms)
#   - workflow_dispatch    -> build + upload artifact only (verification)

on:
  push:
    tags:
      - 'app-v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      # pi can't be --compile'd (reads data files at runtime); build-vn-sidecar.ps1
      # stages it intact from the global install.
      - name: Install pi (bundled into the app)
        run: npm i -g @earendil-works/pi-coding-agent

      - name: Build (NSIS installer)
        working-directory: app
        run: |
          bun install
          bun run tauri build --config src-tauri/tauri.windows.conf.json

      - name: Collect installer under a stable name
        shell: pwsh
        run: |
          $exe = Get-ChildItem app/src-tauri/target/release/bundle/nsis/*-setup.exe | Select-Object -First 1
          if (-not $exe) { throw "no NSIS setup.exe produced" }
          Copy-Item $exe.FullName "VoiceNote-setup.exe"
          Write-Host "installer: $($exe.Name)"

      # workflow_dispatch verification: grab the .exe without cutting a Release.
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoiceNote-setup
          path: VoiceNote-setup.exe

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: VoiceNote-setup.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
